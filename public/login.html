<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Logg inn – Skademelding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF7;--surf:#fff;--ink:#0A0A0A;--ink2:#404040;--ink3:#737373;--ink4:#A3A3A3;--line:#E5E5E2;--line2:#D4D4D0;--red:#B91C1C;--green:#15803D}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{font-family:'Inter',-apple-system,sans-serif;background:#E5E5E2;color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
body{display:flex;justify-content:center;align-items:center;padding:24px 0}
.card{width:100%;max-width:400px;background:var(--bg);border-radius:32px;border:.5px solid var(--line2);box-shadow:0 24px 60px -20px rgba(0,0,0,.18);padding:40px 32px 36px;display:flex;flex-direction:column;gap:0}
@media(max-width:440px){body{padding:0;align-items:flex-start}.card{border-radius:0;border:none;box-shadow:none;min-height:100vh;padding:48px 24px 40px}}
.logo{width:44px;height:44px;background:var(--ink);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.logo svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:'Fraunces',serif;font-weight:400;font-size:30px;letter-spacing:-.02em;line-height:1.15;margin-bottom:8px}
h1 em{font-style:italic}
.sub{font-size:14px;color:var(--ink3);margin-bottom:32px;line-height:1.5}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 16px;border:1px solid var(--line2);border-radius:14px;background:var(--surf);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .15s,border-color .15s}
.google-btn:hover{background:#f7f7f5;border-color:var(--line)}
.google-btn:active{background:#f0f0ed}
.google-icon{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink4);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
form{display:flex;flex-direction:column;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;font-weight:500;color:var(--ink2)}
input[type=email]{width:100%;padding:13px 14px;border:1px solid var(--line2);border-radius:14px;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:var(--surf);outline:none;transition:border-color .15s}
input[type=email]:focus{border-color:var(--ink)}
input[type=email]::placeholder{color:var(--ink4)}
.submit-btn{width:100%;padding:13px;border:none;border-radius:14px;background:var(--ink);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s}
.submit-btn:hover{opacity:.85}
.submit-btn:active{opacity:.75}
.error{background:#FEF2F2;border:1px solid #FECACA;color:var(--red);font-size:13px;padding:12px 14px;border-radius:12px;display:none}
.error.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
  </div>

  <h1>Logg inn på<br><em>Skademelding</em></h1>
  <p class="sub">Fyll ut og generer offisielle skademeldingsskjemaer.</p>

  <div id="error" class="error"></div>

  <a href="/auth/google" class="google-btn">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Fortsett med Google
  </a>

  <div class="divider">eller</div>

  <form method="POST" action="/auth/email">
    <div class="field">
      <label for="email">E-postadresse</label>
      <input type="email" id="email" name="email" placeholder="deg@eksempel.no" required autocomplete="email">
    </div>
    <button type="submit" class="submit-btn">Send innloggingskode</button>
  </form>
</div>

<script>
const p = new URLSearchParams(location.search);
const err = p.get('error');
const msgs = {
  'invalid-email': 'Ugyldig e-postadresse.',
  'email-failed': 'Kunne ikke sende e-post. Prøv igjen.',
  'google': 'Google-innlogging feilet. Prøv igjen.',
  'session': 'Sesjonfeil. Prøv igjen.',
};
if (err && msgs[err]) {
  const el = document.getElementById('error');
  el.textContent = msgs[err];
  el.classList.add('show');
}
</script>
</body>
</html>
