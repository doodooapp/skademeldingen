<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Bekreft kode – Skademelding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF7;--surf:#fff;--ink:#0A0A0A;--ink2:#404040;--ink3:#737373;--ink4:#A3A3A3;--line:#E5E5E2;--line2:#D4D4D0;--red:#B91C1C;--green:#15803D}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{font-family:'Inter',-apple-system,sans-serif;background:#E5E5E2;color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
body{display:flex;justify-content:center;align-items:center;padding:24px 0}
.card{width:100%;max-width:400px;background:var(--bg);border-radius:32px;border:.5px solid var(--line2);box-shadow:0 24px 60px -20px rgba(0,0,0,.18);padding:40px 32px 36px;display:flex;flex-direction:column}
@media(max-width:440px){body{padding:0;align-items:flex-start}.card{border-radius:0;border:none;box-shadow:none;min-height:100vh;padding:48px 24px 40px}}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--ink3);font-size:13px;text-decoration:none;margin-bottom:28px;transition:color .15s}
.back:hover{color:var(--ink)}
.back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon{width:44px;height:44px;background:#EFF6FF;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.icon svg{width:22px;height:22px;fill:none;stroke:#2563EB;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:'Fraunces',serif;font-weight:400;font-size:28px;letter-spacing:-.02em;line-height:1.2;margin-bottom:8px}
.sub{font-size:14px;color:var(--ink3);margin-bottom:28px;line-height:1.5}
.sub strong{color:var(--ink2);font-weight:500}
.error{background:#FEF2F2;border:1px solid #FECACA;color:var(--red);font-size:13px;padding:12px 14px;border-radius:12px;margin-bottom:16px;display:none}
.error.show{display:block}
form{display:flex;flex-direction:column;gap:12px}
.code-wrap{position:relative}
input[type=text]{width:100%;padding:16px 14px;border:1.5px solid var(--line2);border-radius:14px;font-family:'Inter',sans-serif;font-size:28px;font-weight:600;letter-spacing:.2em;text-align:center;color:var(--ink);background:var(--surf);outline:none;transition:border-color .15s;-moz-appearance:textfield}
input[type=text]:focus{border-color:var(--ink)}
input[type=text]::placeholder{color:var(--line2);letter-spacing:.1em;font-size:22px;font-weight:400}
.submit-btn{width:100%;padding:13px;border:none;border-radius:14px;background:var(--ink);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:4px}
.submit-btn:hover{opacity:.85}
.submit-btn:active{opacity:.75}
.resend{margin-top:20px;text-align:center;font-size:13px;color:var(--ink3)}
.resend a{color:var(--ink2);font-weight:500;text-decoration:none}
.resend a:hover{text-decoration:underline}
.resend form{display:inline}
.resend button{background:none;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;padding:0;text-decoration:none}
.resend button:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <a href="/login" class="back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Tilbake
  </a>

  <div class="icon">
    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2 7 12 13 22 7"/></svg>
  </div>

  <h1>Sjekk e-posten din</h1>
  <p class="sub" id="sub">Vi sendte en 6-sifret kode til <strong id="emailDisplay"></strong></p>

  <div id="error" class="error"></div>

  <form method="POST" action="/auth/verify">
    <input type="hidden" name="email" id="emailField">
    <input
      type="text"
      name="code"
      id="codeInput"
      inputmode="numeric"
      pattern="[0-9]{6}"
      maxlength="6"
      placeholder="000000"
      autocomplete="one-time-code"
      required
      autofocus
    >
    <button type="submit" class="submit-btn">Bekreft kode</button>
  </form>

  <p class="resend">
    Fikk du ikke koden?
    <form method="POST" action="/auth/email">
      <input type="hidden" name="email" id="resendEmail">
      <button type="submit">Send på nytt</button>
    </form>
  </p>
</div>

<script>
const params = new URLSearchParams(location.search);
const email = params.get('email') || '';
document.getElementById('emailDisplay').textContent = email;
document.getElementById('emailField').value = email;
document.getElementById('resendEmail').value = email;

const err = params.get('error');
if (err === 'invalid') {
  const el = document.getElementById('error');
  el.textContent = 'Feil eller utløpt kode. Prøv igjen eller send en ny kode.';
  el.classList.add('show');
}

// Auto-submit when 6 digits entered
document.getElementById('codeInput').addEventListener('input', function () {
  this.value = this.value.replace(/\D/g, '').slice(0, 6);
  if (this.value.length === 6) this.closest('form').submit();
});
</script>
</body>
</html>
